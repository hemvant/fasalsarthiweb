version: "3.9"

services:
  laravel_app:
    build: .
    container_name: fasalsarthiweb_laravel
    environment:
      APP_ENV: production
      APP_DEBUG: true
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: fasalsarthi
      DB_USERNAME: pgsql
      DB_PASSWORD: Developer@014789
    volumes:
      - .:/var/www/html
    networks:
      - fasalsarthi_network

  db:
    image: postgres:15
    container_name: fasalsarthiweb_postgres
    restart: always
    environment:
      POSTGRES_DB: fasalsarthi
      POSTGRES_USER: pgsql
      POSTGRES_PASSWORD: Developer@014789
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - fasalsarthi_network

  nginx:
    image: nginx:latest
    container_name: fasalsarthiweb_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - laravel_app
    networks:
      - fasalsarthi_network

volumes:
  db_data:

networks:
  fasalsarthi_network:
    driver: bridge