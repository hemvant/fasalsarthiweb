# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name fasalsarthi.in www.fasalsarthi.in;
    return 301 https://$host$request_uri;
}

# Upstream (we will switch this dynamically)
upstream laravel_upstream {
    server laravel_blue:9000;
}

server {
    listen 443 ssl http2;
    server_name fasalsarthi.in www.fasalsarthi.in;

    ssl_certificate /etc/letsencrypt/live/fasalsarthi.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fasalsarthi.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://laravel_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
