# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name fasalsarthi.in www.fasalsarthi.in;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name fasalsarthi.in www.fasalsarthi.in;

    root /var/www/html/public;
    index index.php index.html;

    # SSL certificate paths
    ssl_certificate /etc/letsencrypt/live/fasalsarthi.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fasalsarthi.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";

    # Laravel routes
    location / {
        try_files $uri /index.php?$query_string;
    }

    # PHP-FPM processing
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_index index.php;
        fastcgi_pass fasalsarthiweb_laravel:9000;
    }

    # Deny access to .htaccess files
    location ~ /\.ht {
        deny all;
    }
}