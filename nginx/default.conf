# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name fasalsarthi.in www.fasalsarthi.in;
    return 301 https://$host$request_uri;
}

upstream laravel_upstream {
    server laravel_blue:9000;
}

server {
    listen 443 ssl http2;
    server_name fasalsarthi.in www.fasalsarthi.in;

    root /var/www/html/public;
    index index.php index.html;

    ssl_certificate /etc/letsencrypt/live/fasalsarthi.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fasalsarthi.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_index index.php;
        fastcgi_pass laravel_upstream;
    }

    location ~ /\.ht {
        deny all;
    }
}
